name: Android CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commit-policy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve commit range
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "COMMIT_RANGE=${{ github.event.pull_request.base.sha }}..${{ github.sha }}" >> "${GITHUB_ENV}"
          elif [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            echo "COMMIT_RANGE=${{ github.sha }}" >> "${GITHUB_ENV}"
          else
            echo "COMMIT_RANGE=${{ github.event.before }}..${{ github.sha }}" >> "${GITHUB_ENV}"
          fi

      - name: Check commit identity and sign-off
        shell: bash
        env:
          EXPECTED_NAME: queukat
          EXPECTED_EMAIL: 75810528+queukat@users.noreply.github.com
        run: bash scripts/ci/check_commit_identity.sh

  build:
    runs-on: ubuntu-latest
    needs: commit-policy
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests, debug build, and lint
        run: ./gradlew testDebugUnitTest assembleDebug lintDebug --console=plain
